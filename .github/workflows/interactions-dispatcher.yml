name: Interactions dispatcher

on:
  workflow_run:
    workflows: ["Continuous integration"]

jobs:
  use_output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        name: 'Interactions dispatcher'

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');

            async function listAllComments(owner, repo, issue_number) {
              return github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number, per_page: 100 },
              );
            }

            async function upsertComment(owner, repo, issue_number, marker, body) {
              const comments = await listAllComments(owner, repo, issue_number);
            
              body = `${marker}\n${body}`;
            
              const existing = comments.filter((c) => typeof c.body === 'string' && c.body.includes(marker));
              if (existing.length > 0) {
                const last = existing[existing.length - 1];
                core.info(`Updating comment ${last.id}`);
                await github.rest.issues.updateComment({
                  owner, repo,
                  body,
                  comment_id: last.id,
                });
              } else {
                core.info(`Creating a comment in issue / PR #${issue_number}`);
                await github.rest.issues.createComment({issue_number, body, owner, repo});
              }
            }
            
            async function run(){
              const {owner, repo} = context.repo;
            
              core.info("Fetching artifacts list")
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                {
                  owner,
                  repo,
                  run_id: context.payload.workflow_run.id,
                  per_page: 100,
                },
              );
            
              const matchArtifact = artifacts.find(artifact => artifact.name === "interaction_data");
              
              if(matchArtifact === undefined) {
                core.info("No artifact found, stopping the action")
                return
              }
            
              core.info(`Downloading artifact #${matchArtifact.id}`)
              const download = await github.rest.actions.downloadArtifact({
                  owner,
                  repo,
                  artifact_id: matchArtifact.id,
                  archive_format: 'zip',
              });

              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: matchArtifact.id
              })
              
              fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/interaction_data.zip`, Buffer.from(download.data));
            
              await exec.exec(`unzip "${process.env.GITHUB_WORKSPACE}/interaction_data.zip"`);
            
              const interaction_data = JSON.parse(fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/interaction_data.json`, 'utf8'));
            
              await Promise.all(interaction_data.map(async (data) => {
                const {mode, marker, issue_number, body} = data;
            
                if(mode === 'upsert')
                  await upsertComment(owner, repo, issue_number, marker, body);
                else if(mode === 'insert')
                  await github.rest.issues.createComment({issue_number, body, owner, repo});
                
              }));
            }
            
            await run();

